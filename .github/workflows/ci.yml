name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test / fmt / clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: clippy (no default features)
        run: cargo clippy --no-default-features -- -D warnings
      - name: clippy (all features)
        run: cargo clippy --all-features --all-targets -- -D warnings
      - name: test
        run: cargo test --all-targets
      - name: test (all features)
        run: cargo test --all-features --all-targets
      - name: doctests
        run: cargo test --doc
      - name: build (no default features)
        run: cargo build --no-default-features

  msrv:
    name: msrv (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pinned to the declared rust-version in Cargo.toml. Uses the committed Cargo.lock
      # (--locked) so the floor is reproducible and not silently raised by a dependency bump.
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - name: build (all features, locked)
        run: cargo build --all-features --locked

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
